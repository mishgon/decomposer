[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "symtrace"
version = "0.1.0"
description = "SymPy tracing and dataset generation for multistep tool-calling."
requires-python = ">=3.12"
dependencies = ["sympy>=1.13,<1.14"]

[tool.setuptools.packages.find]
include = ["symtrace*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
